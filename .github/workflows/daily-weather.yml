name: Daily Weather Digest

on:
  schedule:
    # 10:00 IST = 04:30 UTC
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily weather digest
        env:
          EMAIL_PROVIDER: gmail
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_SECURE: "false"
          # Only SMTP_PASS must be a secret; email addresses are fixed for this project
          SMTP_USER: ${{ secrets.SMTP_USER || 'amol.eng@gmail.com' }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'amol.eng@gmail.com' }}
          TO_EMAIL: ${{ secrets.TO_EMAIL || 'amol.eng@gmail.com' }}
          DIGEST_TIMEZONE: Asia/Kolkata
        run: |
          if [ -z "$SMTP_PASS" ]; then
            echo "ERROR: Repository secret SMTP_PASS is missing or empty."
            echo "Add it at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          python send_daily_digest.py

      - name: Persist James Clear used-issue state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/james_clear_quotes.json
          if git diff --staged --quiet; then
            echo "No quote DB changes to commit."
          else
            git commit -m "chore: mark James Clear 3-2-1 issue used in daily digest"
            git push
          fi
