name: Daily Weather Digest

on:
  schedule:
    # 07:00 IST = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily weather digest
        env:
          # Defaults work for Gmail; override via secrets if needed
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER || 'gmail' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || secrets.SMTP_USER }}
          TO_EMAIL: ${{ secrets.TO_EMAIL || 'amol.eng@gmail.com' }}
          DIGEST_TIMEZONE: Asia/Kolkata
        run: python send_daily_digest.py
